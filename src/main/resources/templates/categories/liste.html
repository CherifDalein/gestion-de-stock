<div th:fragment="content">
    <div class="container-fluid px-4">
        <h1 class="mt-4">Catégories</h1>
        <div class="mb-4 d-flex justify-content-end">
            <a th:href="@{/categories/nouveau}" class="btn btn-primary">
                <i class="fas fa-plus"></i> Ajouter une catégorie
            </a>
        </div>

        <div class="card mb-4">
            <div class="card-header">
                <i class="fas fa-table me-1"></i> Liste des catégories
            </div>
            <div class="card-body">
                <table id="datatablesSimple">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nom</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="cat : ${categories}">
                        <td th:text="${cat.id}"></td>
                        <td th:text="${cat.nom}"></td>
                        <td>
                            <a th:href="@{/categories/modifier/{id}(id=${cat.id})}" class="btn btn-warning btn-sm me-2">
                                Modifier <i class="fas fa-edit"></i>
                            </a>
                            <a th:href="@{/categories/supprimer/{id}(id=${cat.id})}"
                               class="btn btn-danger btn-sm me-2"
                               onclick="return confirm('Supprimer cette catégorie ?')">
                                Supprimer <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
