<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <title>Modifier Fournisseur - Stock Pro</title>
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>
<body class="bg-primary">
<div id="layoutAuthentication">
    <div id="layoutAuthentication_content">
        <main>
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-7">
                        <div class="card shadow-lg border-0 rounded-lg mt-5">
                            <div class="card-header"><h3 class="text-center my-4">Modifier le Fournisseur</h3></div>
                            <div class="card-body">
                                <form th:action="@{/fournisseurs/modifier/{id}(id=${fournisseur.id})}" th:object="${fournisseur}" method="post">

                                    <input type="hidden" th:field="*{id}" />

                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="inputNom" type="text" th:field="*{nom}" required />
                                        <label for="inputNom">Nom du fournisseur / Entreprise</label>
                                    </div>

                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <div class="form-floating mb-3 mb-md-0">
                                                <input class="form-control" id="inputTel" type="tel" th:field="*{telephone}" />
                                                <label for="inputTel">Téléphone</label>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="form-floating">
                                                <input class="form-control" id="inputEmail" type="email" th:field="*{email}" />
                                                <label for="inputEmail">Email</label>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="form-floating mb-3">
                                        <textarea class="form-control" id="inputAdresse" th:field="*{adresse}" style="height: 100px"></textarea>
                                        <label for="inputAdresse">Adresse</label>
                                    </div>

                                    <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                                        <a class="small text-secondary" th:href="@{/fournisseurs}">Annuler</a>
                                        <button type="submit" class="btn btn-warning">Mettre à jour les informations</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
