<div th:fragment="content">
    <div class="container mt-5">
            <h1 class="mt-4"><i class="fas fa-cash-register"></i> Nouvelle vente</h1>
            <div class="mb-4 d-flex justify-content-end">
                <a th:href="@{/ventes}" class="btn btn-success">
                    <i class="fas fa-truck"></i> Liste des ventes
                </a>
            </div>
            <div class="card-body">
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <form th:action="@{/ventes/enregistrer}" th:object="${vente}" method="post" id="formVente">
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Client</label>
                            <select class="form-select" th:field="*{client}">
                                <option value="">Client de passage (Optionnel)</option>
                                <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.nom}"></option>
                            </select>
                        </div>
                    </div>

                    <hr>

                    <div class="row g-3 align-items-end mb-4 bg-light p-3 rounded">
                        <div class="col-md-5">
                            <label class="form-label">Sélectionner un produit</label>
                            <select class="form-select" id="selectProduit">
                                <option value="">Choisir un article...</option>
                                <option th:each="p : ${produits}"
                                        th:value="${p.id}"
                                        th:data-nom="${p.nom}"
                                        th:data-prix="${p.prixVente}"
                                        th:text="${p.nom + ' (' + p.quantite + ' en stock)'}">
                                </option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Quantité</label>
                            <input type="number" id="inputQuantite" class="form-control" value="1" min="1">
                        </div>
                        <div class="col-md-4">
                            <button type="button" class="btn btn-dark w-100" onclick="ajouterAuPanier()">
                                <i class="fas fa-plus"></i> Ajouter au panier
                            </button>
                        </div>
                    </div>

                    <table class="table table-hover mt-3" id="tablePanier">
                        <thead class="table-dark">
                        <tr>
                            <th>Produit</th>
                            <th>Prix Unitaire</th>
                            <th>Quantité</th>
                            <th>Sous-total</th>
                            <th>Action</th>
                        </tr>
                        </thead>
                        <tbody id="panierBody">
                        </tbody>
                    </table>

                    <div class="card bg-light border-0 mt-4 p-3">
                        <div class="row align-items-center">
                            <div class="col-md-4">
                                <h4 class="text-primary mb-0">Total : <span id="totalVente">0</span> GNF</h4>
                                <input type="hidden" th:field="*{montantTotal}" id="inputTotalTotal">
                            </div>
                            <div class="col-md-4">
                                <div class="mb-2">
                                    <label class="small fw-bold text-success">Somme reçue (Cash)</label>
                                    <input type="number" th:field="*{montantVerse}" id="montantVerse"
                                           class="form-control form-control-lg border-success" placeholder="0">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-2">
                                    <label class="small fw-bold text-danger">Reste à payer (Dette)</label>
                                    <input type="number" id="resteAPayer" class="form-control form-control-lg" readonly>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="text-end mt-4">
                        <button type="submit" class="btn btn-primary btn-lg px-5 shadow">
                            <i class="fas fa-check-circle"></i> Valider la vente
                        </button>
                    </div>
                </form>
            </div>
        </div>
    <script th:src="@{/js/panier.js}"></script>
</div>
