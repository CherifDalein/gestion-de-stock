<div th:fragment="content">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div class="card shadow-lg border-0 rounded-lg mt-5">
                    <div class="card-header"><h3 class="text-center my-4">Modifier la Catégorie</h3></div>
                    <div class="card-body">
                        <form th:action="@{/categories/modifier/{id}(id=${categorie.id})}" th:object="${categorie}" method="post">
                            <div class="form-floating mb-3">
                                <input class="form-control" id="inputNom" type="text" th:field="*{nom}" required />
                                <label for="inputNom">Nom de la catégorie</label>
                                <div class="text-danger small" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></div>
                            </div>
                            <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                                <a class="small" th:href="@{/categories}">Annuler</a>
                                <button type="submit" class="btn btn-warning">Mettre à jour</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
