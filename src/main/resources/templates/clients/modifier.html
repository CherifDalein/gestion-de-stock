<div th:fragment="content">
    <div id="layoutAuthentication">
        <div id="layoutAuthentication_content">
            <main>
                <div class="container">
                    <div class="row justify-content-center">
                        <div class="col-lg-7">
                            <div class="card shadow-lg border-0 rounded-lg mt-5">
                                <div class="card-header">
                                    <h3 class="text-center my-4">Modifier le Client</h3>
                                </div>
                                <div class="card-body">
                                    <form th:action="@{/clients/modifier/{id}(id=${client.id})}" th:object="${client}" method="post">
                                        <input type="hidden" th:field="*{id}" />

                                        <div class="form-floating mb-3">
                                            <input class="form-control" id="inputNom" th:field="*{nom}" type="text" placeholder="Nom complet" required />
                                            <label for="inputNom">Nom complet / Raison sociale</label>
                                        </div>

                                        <div class="row mb-3">
                                            <div class="col-md-6">
                                                <div class="form-floating mb-3 mb-md-0">
                                                    <input class="form-control" id="inputTelephone" th:field="*{telephone}" type="tel" placeholder="Telephone" />
                                                    <label for="inputTelephone">Telephone</label>
                                                </div>
                                            </div>
                                            <div class="col-md-6">
                                                <div class="form-floating">
                                                    <input class="form-control" id="inputEmail" th:field="*{email}" type="email" placeholder="Email" />
                                                    <label for="inputEmail">Email</label>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="form-floating mb-3">
                                            <input class="form-control" id="inputAdresse" th:field="*{adresse}" type="text" placeholder="Adresse" />
                                            <label for="inputAdresse">Adresse</label>
                                        </div>

                                        <div class="mt-4 mb-0">
                                            <div class="d-grid">
                                                <button type="submit" class="btn btn-warning btn-block">Mettre a jour le client</button>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                                <div class="card-footer text-center py-3">
                                    <div class="small"><a th:href="@{/clients}">Retour a la liste</a></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</div>
