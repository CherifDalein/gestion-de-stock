<div th:fragment="content">
    <div class="container-fluid px-4">
        <h1 class="mt-4">Achats du Fournisseur</h1>

        <div class="row mb-4">
            <div class="col-xl-4">
                <div class="card bg-danger text-white shadow border-0">
                    <div class="card-body">
                        <div class="small text-white-50 fw-bold text-uppercase">Dette totale (Periode selectionnee)</div>
                        <h2 class="mt-2 fw-bold"
                            th:with="totalReste=${not #lists.isEmpty(achats) ? #aggregates.sum(achats.![resteAPayer]) : 0}"
                            th:text="${#numbers.formatDecimal(totalReste, 0, 'WHITESPACE', 0, 'POINT') + ' GNF'}">
                            0 GNF
                        </h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4 border-0 bg-light shadow-sm">
            <div class="card-body d-flex justify-content-between align-items-center flex-wrap">
                <div class="btn-group mb-2 mb-md-0">
                    <a th:href="@{/factures/fournisseur/{id}(id=${fournisseurId}, periode='jour')}"
                       th:classappend="${param.periode != null and param.periode[0] == 'jour'} ? 'active' : ''"
                       class="btn btn-outline-primary">Aujourd'hui</a>
                    <a th:href="@{/factures/fournisseur/{id}(id=${fournisseurId}, periode='semaine')}"
                       th:classappend="${param.periode != null and param.periode[0] == 'semaine'} ? 'active' : ''"
                       class="btn btn-outline-primary">Semaine</a>
                    <a th:href="@{/factures/fournisseur/{id}(id=${fournisseurId}, periode='mois')}"
                       th:classappend="${param.periode != null and param.periode[0] == 'mois'} ? 'active' : ''"
                       class="btn btn-outline-primary">Mois</a>
                    <a th:href="@{/factures/fournisseur/{id}(id=${fournisseurId}, periode='annee')}"
                       th:classappend="${param.periode != null and param.periode[0] == 'annee'} ? 'active' : ''"
                       class="btn btn-outline-primary">Annee</a>
                    <a th:href="@{/factures/fournisseur/{id}(id=${fournisseurId})}"
                       th:classappend="${param.periode == null} ? 'active' : ''"
                       class="btn btn-outline-primary">Tout</a>
                </div>
                <a th:href="@{/factures/fournisseur/{id}/cumule(id=${fournisseurId}, periode=${param.periode != null ? param.periode[0] : null})}"
                   class="btn btn-primary">
                    <i class="fas fa-print me-1"></i> Releve cumule
                </a>
                <div class="text-muted small">
                    <i class="fas fa-info-circle"></i> Historique pour le fournisseur: <span th:text="${fournisseur.nom}"></span>
                </div>
            </div>
        </div>

        <div class="card shadow border-0">
            <div class="card-header bg-dark text-white">
                <i class="fas fa-table me-1"></i> Detail des achats
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle" id="datatablesSimple">
                        <thead class="table-light">
                        <tr>
                            <th>N Achat</th>
                            <th>Date</th>
                            <th class="text-end">Total</th>
                            <th class="text-end">Verse</th>
                            <th class="text-end">Reste</th>
                            <th class="text-center">Action</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="a : ${achats}">
                            <td class="fw-bold" th:text="'#' + ${a.id}"></td>
                            <td th:text="${#temporals.format(a.dateAchat, 'dd/MM/yyyy')}"></td>
                            <td class="text-end" th:text="${#numbers.formatDecimal(a.montantTotal, 0, 'WHITESPACE', 0, 'POINT') + ' GNF'}"></td>
                            <td class="text-end text-success" th:text="${#numbers.formatDecimal(a.montantVerse, 0, 'WHITESPACE', 0, 'POINT') + ' GNF'}"></td>
                            <td class="text-end text-danger fw-bold" th:text="${#numbers.formatDecimal(a.resteAPayer, 0, 'WHITESPACE', 0, 'POINT') + ' GNF'}"></td>
                            <td class="text-center">
                                <a th:href="@{/factures/achat/{id}(id=${a.id})}" class="btn btn-sm btn-primary">
                                    <i class="fas fa-print"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(achats)}">
                            <td colspan="6" class="text-center py-4 text-muted">
                                Aucun achat trouve pour ce fournisseur sur cette periode.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
