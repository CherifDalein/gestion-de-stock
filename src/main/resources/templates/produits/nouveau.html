<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <title>Nouveau Produit - Stock Pro</title>
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>
<body class="bg-primary">
<div id="layoutAuthentication">
    <div id="layoutAuthentication_content">
        <main>
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-7"> <div class="card shadow-lg border-0 rounded-lg mt-5">
                        <div class="card-header"><h3 class="text-center my-4">Ajouter un Produit</h3></div>
                        <div class="card-body">
                            <form th:action="@{/produits/ajouter}" th:object="${produit}" method="post">

                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <div class="form-floating mb-3 mb-md-0">
                                            <input class="form-control" th:field="*{nom}" type="text" placeholder="Nom" required />
                                            <label>Nom du produit</label>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-floating">
                                            <input class="form-control" th:field="*{reference}" type="text" placeholder="REF-001" required />
                                            <label>Référence</label>
                                        </div>
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <div class="form-floating mb-3 mb-md-0">
                                            <input class="form-control" th:field="*{prixAchat}" type="number" step="0.01" required />
                                            <label>Prix d'Achat</label>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-floating">
                                            <input class="form-control" th:field="*{prixVente}" type="number" step="0.01" required />
                                            <label>Prix de Vente</label>
                                        </div>
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <div class="form-floating mb-3 mb-md-0">
                                            <input class="form-control" th:field="*{quantite}" type="number" required />
                                            <label>Quantité Initiale</label>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-floating">
                                            <select class="form-select" th:field="*{categorie}" required>
                                                <option value="" selected>Choisir...</option>
                                                <option th:each="cat : ${categories}"
                                                        th:value="${cat.id}"
                                                        th:text="${cat.nom}"></option>
                                            </select>
                                            <label>Catégorie</label>
                                        </div>
                                    </div>
                                </div>

                                <div class="mt-4 mb-0">
                                    <div class="d-grid"><button type="submit" class="btn btn-primary btn-block">Enregistrer le produit</button></div>
                                </div>
                            </form>
                        </div>
                        <div class="card-footer text-center py-3">
                            <div class="small"><a th:href="@{/produits}">Retour à la liste</a></div>
                        </div>
                    </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
