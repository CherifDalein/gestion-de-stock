<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facture achat</title>
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    <style>
        body {
            background: #f5f7fb;
        }

        .print-shell {
            max-width: 1080px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .facture-a4 {
            background: #fff;
        }

        @page {
            size: A4;
            margin: 12mm;
        }

        @media print {
            body * {
                visibility: visible !important;
            }

            body {
                background: #fff !important;
            }

            .no-print {
                display: none !important;
                visibility: hidden !important;
            }

            .print-shell {
                max-width: none;
                margin: 0;
                padding: 0;
                visibility: visible !important;
            }

            .print-shell * {
                visibility: visible !important;
            }

            .facture-a4 {
                border: none !important;
                box-shadow: none !important;
                margin: 0 !important;
            }

            table thead {
                display: table-header-group;
            }

            tr,
            td,
            th {
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>
<div class="print-shell">
    <div class="d-flex justify-content-between align-items-center mt-4 mb-3 no-print">
        <h1 class="h3 mb-0">Facture achat</h1>
        <div class="d-flex gap-2">
            <button type="button" class="btn btn-outline-secondary" onclick="history.back()">Retour</button>
            <button class="btn btn-primary" onclick="window.print()">Imprimer</button>
        </div>
    </div>

    <div class="card shadow facture-a4">
        <div class="card-body p-4 p-md-5">
            <div class="row mb-4">
                <div class="col-sm-6">
                    <h2 class="text-primary">STOCK PRO</h2>
                    <div><strong>Adresse :</strong> Conakry, Guinee</div>
                    <div><strong>Email :</strong> contact@stockpro.com</div>
                    <div><strong>Tel :</strong> +224 000 00 00 00</div>
                </div>
                <div class="col-sm-6 text-sm-end">
                    <h3 class="text-muted">ACHAT AUPRES DE</h3>
                    <div class="fw-bold" th:text="${achat.fournisseur != null ? achat.fournisseur.nom : 'Fournisseur'}"></div>
                    <div th:text="${achat.fournisseur != null ? achat.fournisseur.telephone : ''}"></div>
                    <div th:text="${achat.fournisseur != null ? achat.fournisseur.email : ''}"></div>
                    <div class="mt-3">
                        <strong>Date :</strong>
                        <span th:text="${#temporals.format(achat.dateAchat, 'dd/MM/yyyy HH:mm')}"></span>
                    </div>
                    <div>
                        <strong>N Achat :</strong>
                        <span th:text="'#' + ${achat.id}"></span>
                    </div>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-bordered">
                    <thead class="table-light">
                    <tr>
                        <th>Designation</th>
                        <th class="text-center">Quantite</th>
                        <th class="text-end">Prix unitaire</th>
                        <th class="text-end">Total</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="ligne : ${achat.lignes}">
                        <td th:text="${ligne.produit.nom}"></td>
                        <td class="text-center" th:text="${ligne.quantite}"></td>
                        <td class="text-end" th:text="${#numbers.formatDecimal(ligne.prixAchatUnitaire, 0, 'WHITESPACE', 0, 'POINT') + ' GNF'}"></td>
                        <td class="text-end fw-bold" th:text="${#numbers.formatDecimal(ligne.prixAchatUnitaire * ligne.quantite, 0, 'WHITESPACE', 0, 'POINT') + ' GNF'}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="row">
                <div class="col-lg-4 col-sm-5 ms-auto">
                    <table class="table table-clear">
                        <tbody>
                        <tr>
                            <td><strong>Total global</strong></td>
                            <td class="text-end fw-bold" th:text="${#numbers.formatDecimal(achat.montantTotal, 0, 'WHITESPACE', 0, 'POINT') + ' GNF'}"></td>
                        </tr>
                        <tr>
                            <td><strong>Montant verse</strong></td>
                            <td class="text-end text-success" th:text="${#numbers.formatDecimal(achat.montantVerse, 0, 'WHITESPACE', 0, 'POINT') + ' GNF'}"></td>
                        </tr>
                        <tr th:if="${achat.resteAPayer > 0}">
                            <td class="text-danger"><strong>Reste a payer</strong></td>
                            <td class="text-end text-danger fw-bold" th:text="${#numbers.formatDecimal(achat.resteAPayer, 0, 'WHITESPACE', 0, 'POINT') + ' GNF'}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="text-center mt-5 small text-muted">
                Facture d'achat detaillee.
            </div>
        </div>
    </div>
</div>
</body>
</html>
