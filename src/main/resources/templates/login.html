<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div id="layoutAuthentication">
    <div id="layoutAuthentication_content">
        <main>
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-6">
                        <div class="card shadow-lg border-0 rounded-lg mt-5">
                            <div class="card-header">
                                <h3 class="text-center my-4">Connexion</h3>
                            </div>
                            <div class="card-body">
                                <div th:if="${param.registered}" class="alert alert-success">
                                    Compte cree avec succes. Vous pouvez maintenant vous connecter.
                                </div>

                                <form th:action="@{/login}" method="post">
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="inputEmail" type="text" name="username" placeholder="Votre email" required>
                                        <label for="inputEmail">Email</label>
                                    </div>
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="inputPassword" type="password" name="password" placeholder="Mot de passe" required>
                                        <label for="inputPassword">Mot de passe</label>
                                    </div>

                                    <div th:if="${param.error}" class="alert alert-danger" role="alert">
                                        Email ou mot de passe incorrect.
                                    </div>
                                    <div th:if="${param.logout}" class="alert alert-success" role="alert">
                                        Deconnexion reussie.
                                    </div>

                                    <div class="mt-4 mb-0">
                                        <div class="d-grid">
                                            <button type="submit" class="btn btn-primary btn-block">Se connecter</button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                            <div class="card-footer text-center py-3">
                                <div class="small">
                                    Pas encore de compte ? <a th:href="@{/register}">Creer un compte</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
