<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <title>Liste des Produits - Stock Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>
<body class="sb-nav-fixed">
<div id="layoutSidenav_content">
    <main>
        <div class="container-fluid px-4">
            <h1 class="mt-4">Produits</h1>
            <div class="mb-4 d-flex justify-content-end">
                <a th:href="@{/produits/nouveau}" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Ajouter un produit
                </a>
            </div>

            <div class="card mb-4">
                <div class="card-header">
                    <i class="fas fa-table me-1"></i> Inventaire des produits
                </div>
                <div class="card-body">
                    <table id="datatablesSimple">
                        <thead>
                        <tr>
                            <th>Référence</th>
                            <th>Nom</th>
                            <th>Catégorie</th>
                            <th>Prix Achat</th>
                            <th>Prix Vente</th>
                            <th>Stock</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="p : ${produits}">
                            <td th:text="${p.reference}" class="fw-bold text-primary"></td>
                            <td th:text="${p.nom}"></td>
                            <td>
                                <span class="badge bg-secondary" th:text="${p.categorie != null ? p.categorie.nom : 'Sans catégorie'}"></span>
                            </td>
                            <td th:text="${p.prixAchat + ' GNF'}"></td>
                            <td th:text="${p.prixVente + ' GNF'}"></td>
                            <td>
                                <span th:text="${p.quantite}"
                                      th:class="${p.quantite <= 5} ? 'badge bg-danger badge-sm me-2' : 'badge bg-success badge-sm me-2'">
                                </span>
                            </td>
                            <td>
                                <a th:href="@{/produits/modifier/{id}(id=${p.id})}" class="btn btn-warning btn-sm me-2">
                                    Modifier <i class="fas fa-edit"></i>
                                </a>
                                <a th:href="@{/produits/supprimer/{id}(id=${p.id})}"
                                   class="btn btn-danger btn-sm me-2"
                                   onclick="return confirm('Supprimer ce produit définitivement ?')">
                                    Supprimer <i class="fas fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script th:src="@{/js/scripts.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js" crossorigin="anonymous"></script>
<script th:src="@{/js/datatables-simple-demo.js}"></script>
</body>
</html>
