<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h3 class="card-title mb-4 text-center">Connexion</h3>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="text" name="username" class="form-control" placeholder="Votre email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mot de passe</label>
                            <input type="password" name="password" class="form-control" placeholder="Mot de passe" required>
                        </div>

                        <button type="submit" class="btn btn-success w-100">Se connecter</button>

                        <!-- Affichage des erreurs de login -->
                        <div th:if="${param.error}" class="alert alert-danger mt-3">
                            Email ou mot de passe incorrect
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success mt-3">
                            Déconnexion réussie
                        </div>
                    </form>

                    <p class="mt-3 text-center">
                        Pas encore de compte ? <a th:href="@{/register}">S’inscrire</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
