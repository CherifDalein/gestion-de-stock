<div th:fragment="content">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card shadow-lg border-0 rounded-lg mt-5">
                    <div class="card-header"><h3 class="text-center my-4">Ajouter un Fournisseur</h3></div>
                    <div class="card-body">
                        <form th:action="@{/fournisseurs/enregistrer}" th:object="${fournisseur}" method="post">

                            <div class="form-floating mb-3">
                                <input class="form-control" th:field="*{nom}" type="text" placeholder="Nom de l'entreprise" required />
                                <label>Nom du fournisseur / Entreprise</label>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <div class="form-floating mb-3 mb-md-0">
                                        <input class="form-control" th:field="*{telephone}" type="tel" placeholder="+224..." />
                                        <label>Téléphone</label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-floating">
                                        <input class="form-control" th:field="*{email}" type="email" placeholder="contact@fournisseur.com" />
                                        <label>Email</label>
                                    </div>
                                </div>
                            </div>

                            <div class="form-floating mb-3">
                                <textarea class="form-control" th:field="*{adresse}" style="height: 100px" placeholder="Adresse complète"></textarea>
                                <label>Adresse</label>
                            </div>

                            <div class="mt-4 mb-0">
                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary btn-block">Enregistrer le fournisseur</button>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer text-center py-3">
                        <div class="small"><a th:href="@{/fournisseurs}">Retour à la liste</a></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
