<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <title>Historique des Ventes - Stock Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>
<body class="sb-nav-fixed">
<div id="layoutSidenav_content">
    <main>
        <div class="container-fluid px-4">
            <h1 class="mt-4">Ventes</h1>
            <div class="mb-4 d-flex justify-content-end">
                <a th:href="@{/ventes/nouveau}" class="btn btn-success">
                    <i class="fas fa-shopping-cart"></i> Effectuer une vente
                </a>
            </div>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <div class="card mb-4">
                <div class="card-header"><i class="fas fa-table me-1"></i> Journal des transactions</div>
                <div class="card-body">
                    <table id="datatablesSimple">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Date</th>
                            <th>Client</th>
                            <th>Nb Articles</th>
                            <th>Total</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="v : ${ventes}">
                            <td th:text="${v.id}"></td>
                            <td th:text="${#temporals.format(v.dateVente, 'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${v.client != null ? v.client.nom : 'Client de passage'}"></td>
                            <td th:text="${v.lignes.size()}"></td>
                            <td class="fw-bold text-success" th:text="${v.montantTotal + ' GNF'}"></td>
                            <td>
                                <a href="#" class="btn btn-info btn-sm"><i class="fas fa-eye"></i> Détails</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js"></script>
<script th:src="@{/js/datatables-simple-demo.js}"></script>
</body>
</html>
