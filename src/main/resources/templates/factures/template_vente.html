<div th:fragment="content">
    <div class="container-fluid px-4 no-print-buttons">
        <div class="d-flex justify-content-between align-items-center mt-4 mb-3">
            <h1>Facture #<span th:text="${vente.id}"></span></h1>
            <button class="btn btn-primary" onclick="window.print()">
                <i class="fas fa-print me-2"></i>Imprimer la facture
            </button>
        </div>

        <div class="card shadow mb-4 facture-a4">
            <div class="card-body p-5">
                <div class="row mb-4">
                    <div class="col-sm-6">
                        <h2 class="text-primary">STOCK PRO</h2>
                        <div><strong>Adresse :</strong> Conakry, Guinée</div>
                        <div><strong>Email :</strong> contact@stockpro.com</div>
                        <div><strong>Tel :</strong> +224 000 00 00 00</div>
                    </div>
                    <div class="col-sm-6 text-sm-end">
                        <h3 class="text-muted">DOIT À :</h3>
                        <div class="fw-bold" th:text="${vente.client != null ? vente.client.nom : 'Client Passant'}"></div>
                        <div th:text="${vente.client != null ? vente.client.telephone : ''}"></div>
                        <div class="mt-3">
                            <strong>Date :</strong> <span th:text="${#temporals.format(vente.dateVente, 'dd/MM/yyyy HH:mm')}"></span>
                        </div>
                    </div>
                </div>

                <div class="table-responsive-sm">
                    <table class="table table-striped border">
                        <thead class="bg-light">
                        <tr>
                            <th>Désignation</th>
                            <th class="text-center">Quantité</th>
                            <th class="text-end">Prix Unitaire</th>
                            <th class="text-end">Total</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="ligne : ${vente.lignes}">
                            <td th:text="${ligne.produit.nom}"></td>
                            <td class="text-center" th:text="${ligne.quantite}"></td>
                            <td class="text-end" th:text="${#numbers.formatDecimal(ligne.prixUnitaire, 0, 'WHITESPACE', 0, 'POINT') + ' GNF'}"></td>
                            <td class="text-end fw-bold" th:text="${#numbers.formatDecimal(ligne.prixUnitaire * ligne.quantite, 0, 'WHITESPACE', 0, 'POINT') + ' GNF'}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="row">
                    <div class="col-lg-4 col-sm-5 ms-auto">
                        <table class="table table-clear">
                            <tbody>
                            <tr>
                                <td class="left"><strong>Total Global</strong></td>
                                <td class="text-end fw-bold" th:text="${#numbers.formatDecimal(vente.montantTotal, 0, 'WHITESPACE', 0, 'POINT') + ' GNF'}"></td>
                            </tr>
                            <tr>
                                <td class="left"><strong>Montant Versé</strong></td>
                                <td class="text-end text-success" th:text="${#numbers.formatDecimal(vente.montantVerse, 0, 'WHITESPACE', 0, 'POINT') + ' GNF'}"></td>
                            </tr>
                            <tr th:if="${vente.montantTotal > vente.montantVerse}">
                                <td class="left text-danger"><strong>Reste à payer</strong></td>
                                <td class="text-end text-danger fw-bold" th:text="${#numbers.formatDecimal(vente.montantTotal - vente.montantVerse, 0, 'WHITESPACE', 0, 'POINT') + ' GNF'}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="text-center mt-5 small text-muted">
                    Merci de votre confiance ! Les marchandises vendues ne sont ni reprises ni échangées.
                </div>
            </div>
        </div>
    </div>

    <style>
        @media print {
            .sb-topnav, #layoutSidenav_nav, .no-print-buttons, footer { display: none !important; }
            #layoutSidenav_content { margin-left: 0 !important; padding: 0 !important; }
            .facture-a4 { border: none !important; shadow: none !important; }
            body { background-color: white !important; }
        }
    </style>
</div>
