<div th:fragment="content">
    <div class="container-fluid px-4">
        <h1 class="mt-4"><i class="fas fa-truck-loading"></i> Nouvel Approvisionnement</h1>
        <div class="mb-4 d-flex justify-content-end">
            <a th:href="@{/achats}" class="btn btn-success">
                <i class="fas fa-truck"></i> Liste des achats
            </a>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/achats/enregistrer}" th:object="${achat}" method="post" id="achatForm">
            <div class="row">
                <div class="col-md-4">
                    <div class="card shadow-sm mb-4 border-left-primary">
                        <div class="card-header bg-primary text-white fw-bold">
                            <i class="fas fa-money-bill-wave me-1"></i> Règlement Fournisseur
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Fournisseur</label>
                                <select th:field="*{fournisseur}" class="form-select" required>
                                    <option value="">-- Sélectionner le fournisseur --</option>
                                    <option th:each="f : ${fournisseurs}" th:value="${f.id}" th:text="${f.nom}"></option>
                                </select>
                            </div>

                            <hr>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Total Facture (GNF)</label>
                                <input type="number" th:field="*{montantTotal}" id="totalGeneral"
                                       class="form-control form-control-lg fw-bold text-danger bg-light" readonly>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-success">Montant Versé (Cash)</label>
                                <input type="number" th:field="*{montantVerse}" id="montantVerse"
                                       class="form-control form-control-lg border-success" placeholder="Ex: 500000" required step="0.01">
                                <small class="text-muted">Somme réellement payée au fournisseur.</small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Reste à Payer (Dette)</label>
                                <input type="number" id="resteAPayer" class="form-control bg-light fw-bold" readonly>
                            </div>

                            <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm mt-3">
                                <i class="fas fa-save"></i> Valider l'entrée en stock
                            </button>
                        </div>
                    </div>
                </div>

                <div class="col-md-8">
                    <div class="card shadow-sm mb-4">
                        <div class="card-header bg-dark text-white fw-bold">
                            <i class="fas fa-boxes me-1"></i> Produits à ajouter
                        </div>
                        <div class="card-body">
                            <div class="row g-2 mb-4 border-bottom pb-3">
                                <div class="col-md-5">
                                    <label class="small fw-bold">Produit</label>
                                    <select id="selectProduit" class="form-select">
                                        <option value="">-- Choisir un produit --</option>
                                        <option th:each="p : ${produits}"
                                                th:value="${p.id}"
                                                th:data-nom="${p.nom}"
                                                th:data-prix="${p.prixAchat}"
                                                th:text="${p.nom}"></option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label class="small fw-bold">Prix d'Achat Unit.</label>
                                    <input type="number" id="inputPrix" class="form-control" placeholder="Prix">
                                </div>
                                <div class="col-md-2">
                                    <label class="small fw-bold">Quantité</label>
                                    <input type="number" id="inputQtite" class="form-control" placeholder="Qté">
                                </div>
                                <div class="col-md-2 d-flex align-items-end">
                                    <button type="button" class="btn btn-primary w-100 fw-bold" onclick="ajouterLigne()">
                                        <i class="fas fa-plus"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="table-responsive">
                                <table class="table table-hover" id="tableLignes">
                                    <thead class="table-light">
                                    <tr>
                                        <th>Produit</th>
                                        <th style="width: 150px;">Prix Unit.</th>
                                        <th style="width: 100px;">Qté</th>
                                        <th>Sous-total</th>
                                        <th style="width: 50px;"></th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <script th:src="@{/js/achat.js}"></script>
</div>
