<div th:fragment="content">
    <div class="container-fluid px-4">
        <h1 class="mt-4">Journal des Achats</h1>
        <div class="mb-4 d-flex justify-content-end">
            <a th:href="@{/achats/nouveau}" class="btn btn-success">
                <i class="fas fa-truck"></i> Nouvel Approvisionnement
            </a>
        </div>

        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <table id="datatablesSimple" class="table table-striped table-hover">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Date</th>
                        <th>Fournisseur</th>
                     
                        <th>Verse</th>
                        <th>Reste</th>
                        <th>Statut</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="a : ${achats}">
                        <td th:text="${a.id}"></td>
                        <td th:text="${#temporals.format(a.dateAchat, 'dd/MM/yyyy HH:mm')}"></td>
                        <td th:text="${a.fournisseur.nom}"></td>
                        <td class="fw-bold" th:text="${a.montantTotal + ' GNF'}"></td>
                        <td class="text-success" th:text="${(a.montantVerse ?: 0) + ' GNF'}"></td>
                        <td class="text-danger fw-bold"
                            th:text="${(a.montantTotal - (a.montantVerse ?: 0)) + ' GNF'}">
                        </td>
                        <td>
                            <span th:if="${a.montantTotal - (a.montantVerse ?: 0) == 0}" class="badge bg-success">Regle</span>
                            <span th:if="${a.montantTotal - (a.montantVerse ?: 0) > 0}" class="badge bg-warning text-dark">Dette</span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/factures/achat/{id}(id=${a.id})}"
                               class="btn btn-info btn-sm"
                               title="Voir et imprimer la facture d'achat">
                                <i class="fas fa-eye"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
            </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
