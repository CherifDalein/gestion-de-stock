spring.application.name=Stock
# URL de la base de donnťes (localhost:3306 est le port par dťfaut de MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/stock_pro?serverTimezone=UTC&useSSL=false
spring.datasource.username=root
spring.datasource.password=

# Hibernate : On utilise 'update' pour ne pas supprimer les donnťes ŗ chaque redťmarrage
spring.jpa.hibernate.ddl-auto=update

# Pour voir les requÍtes SQL dans la console (pratique pour dťbugger)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


