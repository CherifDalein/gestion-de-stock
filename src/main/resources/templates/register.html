<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inscription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h3 class="card-title mb-4 text-center">Inscription</h3>
                    <form th:action="@{/register}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Nom</label>
                            <input type="text" name="nom" class="form-control" placeholder="Votre nom" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" placeholder="Votre email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mot de passe</label>
                            <input type="password" name="password" class="form-control" placeholder="Mot de passe" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">S’inscrire</button>

                        <!-- Affichage des messages d'erreur ou succès -->
                        <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>
                        <div th:if="${success}" class="alert alert-success mt-3" th:text="${success}"></div>
                    </form>

                    <p class="mt-3 text-center">
                        Déjà un compte ? <a th:href="@{/login}">Se connecter</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
