<div th:fragment="content">
    <div class="container mt-5">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-primary text-white text-center">
                <h3><i class="fas fa-cash-register"></i> Nouvelle Vente</h3>
            </div>
            <div class="card-body">
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <form th:action="@{/ventes/enregistrer}" th:object="${vente}" method="post" id="formVente">
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Client</label>
                            <select class="form-select" th:field="*{client}">
                                <option value="">Client de passage (Optionnel)</option>
                                <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.nom}"></option>
                            </select>
                        </div>
                    </div>

                    <hr>

                    <div class="row g-3 align-items-end mb-4 bg-light p-3 rounded">
                        <div class="col-md-5">
                            <label class="form-label">Sélectionner un produit</label>
                            <select class="form-select" id="selectProduit">
                                <option value="">Choisir un article...</option>
                                <option th:each="p : ${produits}"
                                        th:value="${p.id}"
                                        th:data-nom="${p.nom}"
                                        th:data-prix="${p.prixVente}"
                                        th:text="${p.nom + ' (' + p.quantite + ' en stock)'}">
                                </option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Quantité</label>
                            <input type="number" id="inputQuantite" class="form-control" value="1" min="1">
                        </div>
                        <div class="col-md-4">
                            <button type="button" class="btn btn-dark w-100" onclick="ajouterAuPanier()">
                                <i class="fas fa-plus"></i> Ajouter au panier
                            </button>
                        </div>
                    </div>

                    <table class="table table-hover mt-3" id="tablePanier">
                        <thead class="table-dark">
                        <tr>
                            <th>Produit</th>
                            <th>Prix Unitaire</th>
                            <th>Quantité</th>
                            <th>Sous-total</th>
                            <th>Action</th>
                        </tr>
                        </thead>
                        <tbody id="panierBody">
                        </tbody>
                    </table>

                    <div class="d-flex justify-content-between align-items-center mt-4">
                        <h4 class="text-primary">Total : <span id="totalVente">0</span> GNF</h4>
                        <button type="submit" class="btn btn-primary btn-lg">Valider la vente</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script th:src="@{/js/panier.js}"></script>
</div>
