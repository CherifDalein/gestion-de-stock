<div th:fragment="content">
<div id="layoutAuthentication">
    <div id="layoutAuthentication_content">
        <main>
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-7">
                        <div class="card shadow-lg border-0 rounded-lg mt-5">
                            <div class="card-header"><h3 class="text-center my-4">Modifier le Produit</h3></div>
                            <div class="card-body">
                                <form th:action="@{/produits/modifier/{id}(id=${produit.id})}" th:object="${produit}" method="post">

                                    <input type="hidden" th:field="*{id}" />

                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <div class="form-floating mb-3 mb-md-0">
                                                <input class="form-control" id="inputNom" type="text" th:field="*{nom}" required />
                                                <label for="inputNom">Nom du produit</label>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="form-floating">
                                                <input class="form-control" id="inputRef" type="text" th:field="*{reference}" required />
                                                <label for="inputRef">Référence</label>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <div class="form-floating mb-3 mb-md-0">
                                                <input class="form-control" id="inputPrixAchat" type="number" step="0.01" th:field="*{prixAchat}" required />
                                                <label for="inputPrixAchat">Prix d'Achat (€)</label>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="form-floating">
                                                <input class="form-control" id="inputPrixVente" type="number" step="0.01" th:field="*{prixVente}" required />
                                                <label for="inputPrixVente">Prix de Vente (€)</label>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <div class="form-floating mb-3 mb-md-0">
                                                <input class="form-control" id="inputQuantite" type="number" th:field="*{quantite}" required />
                                                <label for="inputQuantite">Quantité en stock</label>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="form-floating">
                                                <select class="form-select" id="inputCategorie" th:field="*{categorie}" required>
                                                    <option th:each="cat : ${categories}"
                                                            th:value="${cat.id}"
                                                            th:text="${cat.nom}"
                                                            th:selected="${cat.id == produit.categorie?.id}">
                                                    </option>
                                                </select>
                                                <label for="inputCategorie">Catégorie</label>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="form-floating">
                                                <select class="form-select" th:field="*{fournisseur}">
                                                    <option value="" selected>Inconnu / Divers</option>
                                                    <option th:each="f : ${fournisseurs}" th:value="${f.id}" th:text="${f.nom}"></option>
                                                </select>
                                                <label>Fournisseur</label>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                                        <a class="small" th:href="@{/produits}">Annuler</a>
                                        <button type="submit" class="btn btn-warning">Mettre à jour le produit</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
</div>
