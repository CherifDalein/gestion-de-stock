<div th:fragment="content">
    <div class="container-fluid px-4">
        <h1 class="mt-4">Fournisseurs</h1>
        <div class="mb-4 d-flex justify-content-end">
            <a th:href="@{/fournisseurs/nouveau}" class="btn btn-primary">
                <i class="fas fa-plus"></i> Ajouter un fournisseur
            </a>
        </div>

        <div class="card mb-4">
            <div class="card-header">
                <i class="fas fa-address-book me-1"></i> Carnet d'adresses fournisseurs
            </div>
            <div class="card-body">
                <table id="datatablesSimple">
                    <thead>
                    <tr>
                        <th>Nom / Entreprise</th>
                        <th>Téléphone</th>
                        <th>Email</th>
                        <th>Adresse</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="f : ${fournisseurs}">
                        <td th:text="${f.nom}" class="fw-bold text-primary"></td>
                        <td th:text="${f.telephone}"></td>
                        <td th:text="${f.email}"></td>
                        <td th:text="${f.adresse}"></td>
                        <td>
                            <a th:href="@{/fournisseurs/modifier/{id}(id=${f.id})}" class="btn btn-warning btn-sm me-2">
                                Modifier <i class="fas fa-edit"></i>
                            </a>
                            <a th:href="@{/fournisseurs/supprimer/{id}(id=${f.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Supprimer ce fournisseur ? Cela n\'affectera pas les produits déjà enregistrés.')">
                                Supprimer <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
